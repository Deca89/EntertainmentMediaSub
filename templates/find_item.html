<!DOCTYPE html>
<html>

<head>
  <title>Hae kohteita</title>
</head>

<body>
  <h1>Hae kohteita</h1>
  <form action="/find_item" method="get">
    <p>
      Hakusana: <input type="text" name="query" value="{{ query }}"/>
    </p>
    <p>
      Media tyyppi: <br />
      <input type="radio" name="media_type" value="1"
        {% if media_type == "1" %}checked{% endif %} /> TV-sarja
      <input type="radio" name="media_type" value="2"
        {% if media_type == "2" %}checked{% endif %} /> Manga
      <input type="radio" name="media_type" value="3"
        {% if media_type == "3" %}checked{% endif %} /> Anime
      <input type="radio" name="media_type" value="4"
        {% if media_type == "4" %}checked{% endif %} /> LN
    </p>
    <input type="submit" value="Hae" />
  </form>

  {% if query or media_type %}
  <h2>Tulokset</h2>
    <ul>
        {% for result in results %}
        <li><a href="item/{{ result.id }}">{{ result.title }}</a></li>
        {% endfor %}
    </ul>
  {% endif %}

  {% include "footer.html" %}
</body>

</html>
