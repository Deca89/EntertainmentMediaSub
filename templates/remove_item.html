<!DOCTYPE html>
<html>

<head>
  <title>Poista kohdetta</title>
</head>

<body>
  <h1>Kohteen poisto</h1>
  <form action="/remove_item/{{ item.id }}" method="post">
    <p>
      Kohde: {{item.title}}
    </p>
    <p>
      Haluatko varmasti poistaa seurattavan kohteen sovelluksesta?  
    </p>
    <input type="hidden" name="csrf_token" value="{{ session.csrf_token }}" />
    <input type="submit" name="remove" value="Poista kohde" />
    <input type="submit" name="back" value="Palaa takaisin" />
  </form>
  {% include "footer.html" %}
</body>

</html>
